<!DOCTYPE html>
<html lang="pt-BR" class="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gantt Chart Creator</title>
  <meta name="description"
    content="Criador de Diagramas de Gantt interativo — organize suas etapas e exporte em PNG." />

  <!-- Flowbite CSS -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.css" rel="stylesheet" crossorigin="anonymous" />
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" crossorigin="anonymous" />
  <!-- SnapDOM for PNG Export -->
  <script src="https://unpkg.com/@zumer/snapdom/dist/snapdom.js"></script>
  <!-- AlpineJS -->
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/alpinejs/3.13.10/cdn.min.js"></script>
  <!-- Flowbite JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.js"></script>

  <style>
    :root {
      --bg-base: #0f1117;
      --bg-surface: #181c27;
      --bg-card: #1e2333;
      --bg-input: #252b3b;
      --border: #2e3650;
      --accent: #6366f1;
      --accent-light: #818cf8;
      --accent-dim: rgba(99, 102, 241, 0.15);
      --text-primary: #e2e8f0;
      --text-secondary: #94a3b8;
      --text-muted: #4b5563;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --radius: 10px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-base);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ───────────────────────────────────────────── */
    header {
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(10px);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--accent-light);
      letter-spacing: -0.3px;
    }

    .logo svg {
      color: var(--accent);
    }

    .header-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    /* ── Buttons ──────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 0.18s ease;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:hover {
      background: #4f46e5;
      transform: translateY(-1px);
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover {
      background: var(--bg-card);
      color: var(--text-primary);
    }

    .btn-danger {
      background: transparent;
      color: var(--danger);
      border: 1px solid transparent;
      padding: 5px 8px;
    }

    .btn-danger:hover {
      background: rgba(239, 68, 68, 0.1);
    }

    .btn-success {
      background: var(--success);
      color: #fff;
    }

    .btn-success:hover {
      background: #059669;
      transform: translateY(-1px);
    }

    .btn-sm {
      padding: 5px 12px;
      font-size: 0.78rem;
    }

    /* ── Main layout ──────────────────────────────────────── */
    .app-layout {
      display: flex;
      flex: 1;
      overflow: hidden;
      height: calc(100vh - 57px);
    }

    /* ── Sidebar ──────────────────────────────────────────── */
    .sidebar {
      width: 380px;
      min-width: 320px;
      background: var(--bg-surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: width 0.25s;
    }

    .sidebar.collapsed {
      width: 0;
      min-width: 0;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 18px 20px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .sidebar-title {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    .sidebar-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    .sidebar-body::-webkit-scrollbar {
      width: 4px;
    }

    .sidebar-body::-webkit-scrollbar-track {
      background: transparent;
    }

    .sidebar-body::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }

    /* ── Project Info ─────────────────────────────────────── */
    .project-info-section {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 16px;
    }

    .section-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }

    /* ── Form inputs ──────────────────────────────────────── */
    .form-group {
      margin-bottom: 10px;
    }

    .form-group label {
      display: block;
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      background: var(--bg-input);
      border: 1px solid var(--border);
      color: var(--text-primary);
      border-radius: 7px;
      padding: 7px 10px;
      font-size: 0.83rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }

    .form-group input:focus,
    .form-group select:focus {
      border-color: var(--accent);
    }

    .form-row {
      display: flex;
      gap: 8px;
    }

    .form-row .form-group {
      flex: 1;
    }

    /* ── Task list ────────────────────────────────────────── */
    .task-item {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      margin-bottom: 8px;
      cursor: grab;
      transition: border-color 0.15s, box-shadow 0.15s;
      position: relative;
    }

    .task-item:hover {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent-dim);
    }

    .task-item.is-phase {
      border-left: 3px solid var(--accent);
      background: linear-gradient(90deg, var(--accent-dim) 0%, var(--bg-card) 100%);
    }

    .task-item-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }

    .task-id {
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--accent-light);
      background: var(--accent-dim);
      padding: 2px 6px;
      border-radius: 4px;
      white-space: nowrap;
    }

    .task-name {
      font-size: 0.83rem;
      font-weight: 500;
      color: var(--text-primary);
      flex: 1;
      line-height: 1.3;
    }

    .task-name.phase-name {
      font-weight: 700;
    }

    .task-meta {
      display: flex;
      gap: 8px;
      margin-top: 6px;
      flex-wrap: wrap;
    }

    .meta-chip {
      font-size: 0.68rem;
      color: var(--text-secondary);
      background: var(--bg-input);
      padding: 2px 7px;
      border-radius: 20px;
      border: 1px solid var(--border);
    }

    .task-actions {
      display: flex;
      gap: 2px;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .task-item:hover .task-actions {
      opacity: 1;
    }

    /* ── Add task form ────────────────────────────────────── */
    .add-task-form {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      margin-top: 8px;
    }

    /* ── Main content ─────────────────────────────────────── */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chart-toolbar {
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg-surface);
    }

    .chart-area {
      flex: 1;
      overflow: auto;
      padding: 28px 24px;
    }

    .chart-area::-webkit-scrollbar {
      height: 6px;
      width: 6px;
    }

    .chart-area::-webkit-scrollbar-track {
      background: var(--bg-base);
    }

    .chart-area::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }

    /* ── Gantt Chart ──────────────────────────────────────── */
    #gantt-container {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      min-width: 800px;
    }

    .gantt-header-info {
      margin-bottom: 20px;
    }

    .gantt-project-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text-primary);
    }

    .gantt-project-sub {
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-top: 3px;
    }

    .gantt-table {
      width: 100%;
      border-collapse: collapse;
    }

    /* time scale header */
    .gantt-scale-row th {
      font-size: 0.68rem;
      font-weight: 600;
      color: var(--text-primary);
      text-align: center;
      padding: 4px 2px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-base);
    }

    .gantt-scale-row th.month-header {
      color: var(--text-secondary);
      font-size: 0.73rem;
      font-weight: 700;
      border-right: 1px solid var(--border);
      letter-spacing: 0.3px;
      padding: 6px 8px !important;
    }

    .gantt-row td {
      padding: 3px 0;
      vertical-align: middle;
    }

    .gantt-row:hover td {
      background: rgba(255, 255, 255, 0.02);
    }

    /* info columns */
    .col-id {
      width: 54px;
      text-align: center;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--accent-light);
      padding-right: 8px !important;
      white-space: nowrap;
    }

    .col-name {
      font-size: 1rem;
      color: var(--text-primary);
      padding-right: 16px;
      white-space: nowrap;
    }

    .col-name.is-phase {
      font-weight: 700;
      color: var(--accent-light);
    }

    .col-resp {
      font-size: 0.8rem;
      color: var(--text-secondary);
      padding-right: 5px !important;
      padding-left: 5px !important;
      white-space: nowrap;
    }

    .col-chart {
      position: relative;
    }

    /* day cells */
    .day-cell {
      width: 18px;
      min-width: 18px;
      height: 28px;
      position: relative;
      border-right: 1px solid transparent;
      line-height: 28px;
    }

    .day-cell.weekend {
      background: rgba(255, 255, 255, 0.015);
    }

    .day-cell.month-start {
      border-left: 1px solid var(--border);
    }

    .day-cell.today-col {
      background: rgba(99, 102, 241, 0.07);
    }

    /* bar inside a day cell */
    .bar-segment {
      position: absolute;
      top: 4px;
      left: 0;
      right: 0;
      bottom: 4px;
      border-radius: 0;
      transition: opacity 0.15s;
    }

    .bar-segment.bar-start {
      border-radius: 6px 0 0 6px;
      left: 2px;
    }

    .bar-segment.bar-end {
      border-radius: 0 6px 6px 0;
      right: 2px;
    }

    .bar-segment.bar-only {
      border-radius: 6px;
      left: 2px;
      right: 2px;
    }

    .bar-segment.bar-phase {
      top: 6px;
      bottom: 6px;
      opacity: 0.45;
    }

    .bar-segment.bar-phase.bar-start {
      border-radius: 4px 0 0 4px;
    }

    .bar-segment.bar-phase.bar-end {
      border-radius: 0 4px 4px 0;
    }

    .bar-segment.bar-phase.bar-only {
      border-radius: 4px;
    }

    /* today line */
    .today-line {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--accent);
      opacity: 0.7;
      z-index: 5;
    }

    /* month separator in grid */
    .month-sep {
      border-left: 1px solid var(--border) !important;
    }

    /* empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 80px 40px;
      text-align: center;
    }

    .empty-state svg {
      color: var(--text-muted);
    }

    .empty-state h3 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-secondary);
    }

    .empty-state p {
      font-size: 0.83rem;
      color: var(--text-muted);
    }

    /* ── Modal ────────────────────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(3px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-box {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      width: 480px;
      max-width: 95vw;
      padding: 28px;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
    }

    .modal-title {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 20px;
      color: var(--text-primary);
    }

    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 22px;
    }

    /* ── Toast ────────────────────────────────────────────── */
    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 999;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toast {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 0.83rem;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 8px;
      animation: slideInToast 0.25s ease;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
    }

    .toast.toast-success {
      border-left: 3px solid var(--success);
    }

    .toast.toast-error {
      border-left: 3px solid var(--danger);
    }

    @keyframes slideInToast {
      from {
        opacity: 0;
        transform: translateY(12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── Misc ─────────────────────────────────────────────── */
    .badge-phase {
      font-size: 0.65rem;
      font-weight: 700;
      color: var(--accent);
      background: var(--accent-dim);
      border: 1px solid var(--accent);
      padding: 1px 5px;
      border-radius: 3px;
      text-transform: uppercase;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 14px 0;
    }

    .count-badge {
      font-size: 0.7rem;
      background: var(--accent-dim);
      color: var(--accent-light);
      border-radius: 20px;
      padding: 1px 8px;
    }

    [x-cloak] {
      display: none !important;
    }
  </style>
</head>

<body>

  <!-- ═══════════════════════════════════════════════════════════
     MAIN APP
═══════════════════════════════════════════════════════════ -->
  <div x-data="ganttApp()" x-init="init()" x-cloak>

    <!-- HEADER -->
    <header>
      <div class="logo">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2" />
          <line x1="8" y1="2" x2="8" y2="6" />
          <line x1="16" y1="2" x2="16" y2="6" />
          <line x1="3" y1="10" x2="21" y2="10" />
          <line x1="8" y1="14" x2="14" y2="14" />
          <line x1="8" y1="18" x2="16" y2="18" />
        </svg>
        Gantt Chart Creator
      </div>
      <div class="header-actions">
        <button class="btn btn-ghost" @click="sidebarOpen = !sidebarOpen">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="12" x2="21" y2="12" />
            <line x1="3" y1="6" x2="21" y2="6" />
            <line x1="3" y1="18" x2="21" y2="18" />
          </svg>
          <span x-text="sidebarOpen ? 'Ocultar Painel' : 'Exibir Painel'"></span>
        </button>
        <button class="btn btn-ghost" @click="clearAll()" title="Limpar todos os dados">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6" />
            <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6" />
            <path d="M10 11v6M14 11v6" />
            <path d="M9 6V4h6v2" />
          </svg>
          Limpar
        </button>
        <button class="btn btn-success" @click="loadSampleData()" title="Carregar dados de exemplo">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" />
            <polyline points="17 8 12 3 7 8" />
            <line x1="12" y1="3" x2="12" y2="15" />
          </svg>
          Exemplo
        </button>
        <button class="btn btn-primary" @click="exportPNG()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" />
            <polyline points="7 10 12 15 17 10" />
            <line x1="12" y1="15" x2="12" y2="3" />
          </svg>
          Exportar PNG
        </button>
      </div>
    </header>

    <!-- APP LAYOUT -->
    <div class="app-layout">

      <!-- SIDEBAR -->
      <aside class="sidebar" :class="{ collapsed: !sidebarOpen }">
        <div class="sidebar-header">
          <span class="sidebar-title">Tarefas</span>
          <span class="count-badge" x-text="tasks.length + ' itens'"></span>
        </div>

        <div class="sidebar-body">

          <!-- Project Info -->
          <div class="project-info-section">
            <div class="section-label">Projeto</div>
            <div class="form-group">
              <label>Nome do Projeto</label>
              <input type="text" x-model="project.name" @input="save()" placeholder="Ex: Projeto Final TCC" />
            </div>
            <div class="form-group">
              <label>Responsável Geral</label>
              <input type="text" x-model="project.owner" @input="save()" placeholder="Ex: Equipe Alpha" />
            </div>
          </div>

          <!-- Task List -->
          <div class="section-label" style="margin-bottom:10px;">
            Itens do Diagrama
          </div>

          <template x-for="(task, index) in tasks" :key="task.id">
            <div class="task-item" :class="{ 'is-phase': task.isPhase }">
              <div class="task-item-header">
                <span class="task-id" x-text="task.taskId || '#'"></span>
                <span class="task-name" :class="{ 'phase-name': task.isPhase }"
                  x-text="task.name || '(sem nome)'"></span>
                <div class="task-actions">
                  <button class="btn btn-ghost btn-sm" @click="openEdit(index)" title="Editar">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7" />
                      <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z" />
                    </svg>
                  </button>
                  <button class="btn btn-danger btn-sm" @click="removeTask(index)" title="Remover">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <line x1="18" y1="6" x2="6" y2="18" />
                      <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                  </button>
                </div>
              </div>
              <div class="task-meta">
                <span class="meta-chip" x-show="task.isPhase"><span class="badge-phase">fase</span></span>
                <span class="meta-chip" x-text="formatDate(task.start)"></span>
                <span class="meta-chip">→ <span x-text="formatDate(task.end)"></span></span>
                <span class="meta-chip" x-show="task.responsible" x-text="task.responsible"></span>
              </div>
            </div>
          </template>

          <div class="divider"></div>

          <!-- Add Task Button -->
          <button class="btn btn-primary" style="width:100%; justify-content:center;" @click="openAdd()">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10" />
              <line x1="12" y1="8" x2="12" y2="16" />
              <line x1="8" y1="12" x2="16" y2="12" />
            </svg>
            Adicionar Tarefa
          </button>
        </div>
      </aside>

      <!-- MAIN CONTENT -->
      <main class="main-content">
        <div class="chart-toolbar">
          <div style="display:flex; align-items:center; gap:12px;">
            <span style="font-size:0.85rem; font-weight:600; color:var(--text-secondary);">Diagrama de Gantt</span>
            <span x-show="tasks.length" class="count-badge" x-text="tasks.length + ' itens'"></span>

          <!-- Gantt Chart -->

            <div class="gantt-header-info">
              <div class="gantt-project-title" x-text="project.name || 'Projeto sem nome'"></div>

            <div style="overflow-x:auto;">
              <table class="gantt-table" :style="'min-width:' + (280 + days.length * parseInt(scale)) + 'px'">
                <!-- Month row -->

                  <tr class="gantt-scale-row">
                    <th style="width:54px;border-right:1px solid var(--border);"></th>

                    </th>

                      <th class="month-header" :colspan="m.span" style="text-align:left; padding-left:6px; white-space: nowrap;"
                        x-text="m.label"></th>

                  <!-- Day row -->
                  <tr class="gantt-scale-row">
                    <th style="border-right:1px solid var(--border); color:var(--text-primary); font-size:0.65rem;">ID
                    </th>
                    <th
                      style="border-right:1px solid var(--border); text-align:left; padding-left:4px; color:var(--text-primary); font-size:0.65rem;">
                      ATIVIDADE</th>
                    <th
                      style="border-right:1px solid var(--border); text-align:left; padding-left:4px; color:var(--text-primary); font-size:0.65rem;">
                      RESPONSÁVEL</th>
                    <template x-for="(d, di) in days" :key="di">
                      <th
                        :style="'width:' + scale + 'px; min-width:' + scale + 'px; ' +
                                (d.isMonthStart ? 'border-left:1px solid var(--border);' : '') +
                                (d.isToday ? 'background:#ec4899; color:#fff; border-radius:4px; font-weight:700;' : '')"
                        x-text="d.day">

                </thead>
                <tbody>
                  <template x-for="(task, ti) in tasks" :key="task.id">
                    <tr class="gantt-row">
                      <td class="col-id" x-text="task.taskId"></td>
                      <td class="col-name" :class="{'is-phase': task.isPhase}" :title="task.name" x-text="task.name">
                      </td>
                      <td class="col-resp" :title="task.responsible" x-text="task.responsible"></td>
                      <template x-for="(d, di) in days" :key="di">
                        <td class="day-cell" :class="{
                            'weekend': d.isWeekend,
                            'month-start': d.isMonthStart,
                            'today-col': d.isToday
                          }" :style="'width:' + scale + 'px; min-width:' + scale + 'px;'">
                          <template x-if="isInRange(task, d)">
                            <div class="bar-segment" :class="{
                                 'bar-phase': task.isPhase,
                                 'bar-start': isBarStart(task, d) && !isBarEnd(task, d),
                                 'bar-end':   isBarEnd(task, d)   && !isBarStart(task, d),
                                 'bar-only':  isBarStart(task, d) && isBarEnd(task, d)
                               }" :style="{ backgroundColor: taskColor(task) }">
                            </div>
                          </template>
                        </td>
                      </template>
                    </tr>
                  </template>
                </tbody>
              </table>
            </div>

            <!-- Legend -->
            <div style="display:flex; gap:16px; margin-top:18px; flex-wrap:wrap; align-items:center;">

              <div style="flex:1;"></div>
              <span style="font-size:0.9rem;color:var(--text-primary);"
                x-text="'Período: ' + formatDate(chartStart) + ' — ' + formatDate(chartEnd)"></span>
            </div>
          </div>
        </div>
      </main>
    </div>

    <!-- ══════════════════════════════════
       ADD / EDIT TASK MODAL
  ══════════════════════════════════ -->
    <div class="modal-overlay" x-show="modal.open" x-transition.opacity @click.self="modal.open=false">

  <script>
    /* ════════════════════════════════════════════
       Palette of colors for task bars
    ════════════════════════════════════════════ */
    const COLORS = [
      '#10b981', '#3b82f6', '#f59e0b', '#ec4899', '#8b5cf6',
      '#06b6d4', '#84cc16', '#f97316', '#14b8a6', '#a855f7'
    ];
    const PHASE_COLOR = '#6366f1';

    /* ════════════════════════════════════════════
       Helpers
    ════════════════════════════════════════════ */
    function parseLocalDate(str) {
      if (!str) return null;
      const [y, m, d] = str.split('-').map(Number);
      return new Date(y, m - 1, d);
    }

    function toInputDate(date) {
      if (!date || isNaN(date)) return '';
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    function addDays(date, n) {
      const d = new Date(date);
      d.setDate(d.getDate() + n);
      return d;
    }

    function dateDiff(a, b) {
      return Math.round((b - a) / 86400000);
    }

    function fmtDateBR(date) {
      if (!date || isNaN(date)) return '—';
      return date.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: '2-digit' });
    }

    /* ════════════════════════════════════════════
       AlpineJS App
    ════════════════════════════════════════════ */
    function ganttApp() {
      return {
        sidebarOpen: true,
        scale: 18,
        project: { name: '', owner: '' },
        tasks: [],
        toasts: [],
        modal: {
          open: false,
          editIndex: null,
          form: { taskId: '', name: '', start: '', end: '', responsible: '', isPhase: 'false' }
        },

        /* ─── Lifecycle ─── */
        init() {
          this.load();
          // Watch for changes and auto-save
          this.$watch('tasks', () => this.save());
          this.$watch('project', () => this.save());
        },

        /* ─── Persistence ─── */
        save() {
          localStorage.setItem('gantt_project', JSON.stringify(this.project));
          localStorage.setItem('gantt_tasks', JSON.stringify(this.tasks));
        },
        load() {
          try {
            const p = localStorage.getItem('gantt_project');
            const t = localStorage.getItem('gantt_tasks');
            if (p) this.project = JSON.parse(p);
            if (t) this.tasks = JSON.parse(t);
          } catch (e) { /* ignore */ }
        },

        /* ─── Computed: chart date range ─── */
        get chartStart() {
          if (!this.tasks.length) return new Date();
          const dates = this.tasks.map(t => parseLocalDate(t.start)).filter(Boolean);
          return dates.reduce((a, b) => a < b ? a : b);
        },
        get chartEnd() {
          if (!this.tasks.length) return addDays(new Date(), 30);
          const dates = this.tasks.map(t => parseLocalDate(t.end)).filter(Boolean);
          return dates.reduce((a, b) => a > b ? a : b);
        },

        /* ─── Computed: days array ─── */
        get days() {
          const result = [];
          if (!this.tasks.length) return result;
          const start = addDays(this.chartStart, -2);
          const end = addDays(this.chartEnd, 2);
          const today = new Date();
          let cur = new Date(start);
          let prevMonth = -1;
          while (cur <= end) {
            const isMonthStart = cur.getMonth() !== prevMonth;
            prevMonth = cur.getMonth();
            result.push({
              date: new Date(cur),
              day: cur.getDate(),
              month: cur.getMonth(),
              year: cur.getFullYear(),
              isWeekend: cur.getDay() === 0 || cur.getDay() === 6,
              isMonthStart,
              isToday: cur.toDateString() === today.toDateString()
            });
            cur = addDays(cur, 1);
          }
          return result;
        },

        /* ─── Computed: month groups for header ─── */
        get monthGroups() {
          const groups = [];
          let cur = null;
          for (const d of this.days) {
            const label = d.date.toLocaleDateString('pt-BR', { month: 'short', year: '2-digit' });
            if (!cur || cur.label !== label) {
              cur = { label, span: 1 };
              groups.push(cur);
            } else {
              cur.span++;
            }
          }
          return groups;
        },

        /* ─── Bar helpers ─── */
        isInRange(task, d) {
          const s = parseLocalDate(task.start);
          const e = parseLocalDate(task.end);
          if (!s || !e) return false;
          return d.date >= s && d.date <= e;
        },
        isBarStart(task, d) {
          const s = parseLocalDate(task.start);
          return s && d.date.toDateString() === s.toDateString();
        },
        isBarEnd(task, d) {
          const e = parseLocalDate(task.end);
          return e && d.date.toDateString() === e.toDateString();
        },
        taskColor(task) {
          if (task.color) return task.color;
          if (task.isPhase) return PHASE_COLOR;
          const index = this.tasks.indexOf(task);
          return COLORS[(index >= 0 ? index : 0) % COLORS.length];
        },

        /* ─── Date formatting ─── */
        formatDate(val) {
          if (!val) return '—';
          if (val instanceof Date) return fmtDateBR(val);
          return fmtDateBR(parseLocalDate(val));
        },

        /* ─── Modal ─── */
        openAdd() {
          this.modal.editIndex = null;
          this.modal.form = { taskId: '', name: '', start: '', end: '', responsible: '', isPhase: 'false', color: this.defaultColor() };
          this.modal.open = true;
        },
        openEdit(index) {
          this.modal.editIndex = index;
          const t = this.tasks[index];
          this.modal.form = {
            taskId: t.taskId,
            name: t.name,
            start: t.start,
            end: t.end,
            responsible: t.responsible,
            isPhase: String(t.isPhase),
            color: t.color || this.defaultColor(index)
          };
          this.modal.open = true;
        },
        defaultColor(index) {
          const i = index !== undefined ? index : this.tasks.length;
          return COLORS[i % COLORS.length];
        },
        saveTask() {
          const f = this.modal.form;
          if (!f.name.trim()) { this.toast('Informe o nome da atividade.', 'error'); return; }
          if (!f.start || !f.end) { this.toast('Informe as datas de início e fim.', 'error'); return; }
          if (f.start > f.end) { this.toast('A data de início deve ser anterior ao fim.', 'error'); return; }

          const task = {
            id: this.modal.editIndex !== null
              ? this.tasks[this.modal.editIndex].id
              : Date.now() + Math.random(),
            taskId: f.taskId.trim() || '#',
            name: f.name.trim(),
            start: f.start,
            end: f.end,
            responsible: f.responsible.trim(),
            isPhase: f.isPhase === 'true',
            color: f.color || this.defaultColor()
          };

          if (this.modal.editIndex !== null) {
            this.tasks.splice(this.modal.editIndex, 1, task);
            this.toast('Tarefa atualizada!', 'success');
          } else {
            this.tasks.push(task);
            this.toast('Tarefa adicionada!', 'success');
          }
          this.modal.open = false;
        },
        removeTask(index) {
          this.tasks.splice(index, 1);
          this.toast('Tarefa removida.', 'success');
        },

        /* ─── Clear all ─── */
        clearAll() {
          if (!this.tasks.length && !this.project.name) return;
          if (confirm('Limpar todos os dados? Esta ação não pode ser desfeita.')) {
            this.tasks = [];
            this.project = { name: '', owner: '' };
            this.toast('Dados limpos.', 'success');
          }
        },

        /* ─── Export PNG ─── */
        async exportPNG() {
          const el = document.getElementById('gantt-container');
          if (!el) return;
          this.toast('Gerando PNG…', 'success');

          // Preparar container para exportar todo o conteúdo (remover scroll e restrições)
          const scrollArea = el.querySelector('div[style*="overflow-x:auto"]') || el.querySelector('.gantt-table').parentElement;
          const table = el.querySelector('.gantt-table');
          const fullWidth = Math.max(scrollArea.scrollWidth, table.offsetWidth);

          // Salvar estado original de `el` e sub-elementos
          const originalElWidth = el.style.width;
          const originalElMaxWidth = el.style.maxWidth;
          const originalScrollOverflow = scrollArea.style.overflowX;
          const originalScrollWidth = scrollArea.style.width;
          const originalScrollMaxWidth = scrollArea.style.maxWidth;

          // Expandir os elementos internos
          scrollArea.style.overflowX = 'visible';
          scrollArea.style.width = fullWidth + 'px';
          scrollArea.style.maxWidth = 'none';
          el.style.width = fullWidth + 'px';
          el.style.maxWidth = 'none';
          
          // Salvar estado original dos ancestrais para remover restrições de clipping
          const ancestors = [];
          let currentParent = el.parentElement;
          while (currentParent && currentParent !== document.body) {
            ancestors.push({
              el: currentParent,
              overflow: currentParent.style.overflow,
              overflowX: currentParent.style.overflowX,
              overflowY: currentParent.style.overflowY,
            });
            currentParent.style.overflow = 'visible';
            currentParent.style.overflowX = 'visible';
            currentParent.style.overflowY = 'visible';
            currentParent = currentParent.parentElement;
          }

          await new Promise(r => setTimeout(r, 150)); // Delay para aplicar o layout

          // Using SnapDOM
          snapdom.download(el, {
            backgroundColor: '#181c27',
            scale: 2, /* reduzido para evitar travamento em imagens gigantes */
            format: 'png',
            filename: (this.project.name || 'gantt')
          }).then(() => {
            // Restaurar estado original do DOM
            scrollArea.style.overflowX = originalScrollOverflow;
            scrollArea.style.width = originalScrollWidth;
            scrollArea.style.maxWidth = originalScrollMaxWidth;
            el.style.width = originalElWidth;
            el.style.maxWidth = originalElMaxWidth;
            
            ancestors.forEach(anc => {
              anc.el.style.overflow = anc.overflow;
              anc.el.style.overflowX = anc.overflowX;
              anc.el.style.overflowY = anc.overflowY;
            });

            this.toast('PNG exportado com sucesso!', 'success');
          }).catch((err) => {
            console.error(err);
            // Restaurar estado original em caso de erro
            scrollArea.style.overflowX = originalScrollOverflow;
            scrollArea.style.width = originalScrollWidth;
            scrollArea.style.maxWidth = originalScrollMaxWidth;
            el.style.width = originalElWidth;
            el.style.maxWidth = originalElMaxWidth;
            
            ancestors.forEach(anc => {
              anc.el.style.overflow = anc.overflow;
              anc.el.style.overflowX = anc.overflowX;
              anc.el.style.overflowY = anc.overflowY;
            });
            this.toast('Erro ao exportar PNG.', 'error');
          });
        },

        /* ─── Toast ─── */
        toast(msg, type = 'success') {
          const id = Date.now();
          this.toasts.push({ id, msg, type });
          setTimeout(() => {
            this.toasts = this.toasts.filter(t => t.id !== id);
          }, 3000);
        },

        loadSampleData() {

          };
          this.tasks = [

            { id: 4, taskId: '1.3', name: 'Personas e Histórias de Usuário', start: '2026-02-21', end: '2026-03-01', responsible: 'Luiz', isPhase: false },
            { id: 5, taskId: '1.4', name: 'Consolidação da Documentação', start: '2026-03-02', end: '2026-03-08', responsible: 'Melk', isPhase: false },
            { id: 6, taskId: '2.0', name: 'Etapa 2: Arquitetura e Design', start: '2026-03-09', end: '2026-04-05', responsible: 'Todos', isPhase: true },
            { id: 7, taskId: '2.1', name: 'Projeto de Interface (UX/UI)', start: '2026-03-09', end: '2026-03-22', responsible: 'Luiz, João', isPhase: false },
            { id: 8, taskId: '2.2', name: 'Arquitetura da Solução (React Native/API)', start: '2026-03-09', end: '2026-03-22', responsible: 'Thais, Gabriel', isPhase: false },
            { id: 9, taskId: '2.3', name: 'Definição de KPIs e Metas', start: '2026-03-23', end: '2026-04-05', responsible: 'Melk, Nathaliene', isPhase: false },
            { id: 10, taskId: '3.0', name: 'Etapa 3: Desenvolvimento e Testes', start: '2026-04-06', end: '2026-05-10', responsible: 'Todos', isPhase: true },
            { id: 11, taskId: '3.1', name: 'Programação das Funcionalidades (Front)', start: '2026-04-06', end: '2026-05-03', responsible: 'Gabriel, João, Nathaliene', isPhase: false },

            { id: 13, taskId: '3.3', name: 'Planos e Registros de Testes', start: '2026-05-04', end: '2026-05-10', responsible: 'Thais, Luiz', isPhase: false },
            { id: 14, taskId: '4.0', name: 'Etapa 4: Entrega e Configuração', start: '2026-05-11', end: '2026-05-31', responsible: 'Todos', isPhase: true },
            { id: 15, taskId: '4.1', name: 'Ajustes Finais e Bug Fixes', start: '2026-05-11', end: '2026-05-20', responsible: 'Todos', isPhase: false },
            { id: 16, taskId: '4.2', name: 'Gerência de Configuração (Repo/Deploy)', start: '2026-05-21', end: '2026-05-25', responsible: 'Gabriel', isPhase: false },
          ];
          this.toast('Dados de exemplo carregados!', 'success');
        }
      };
    }
